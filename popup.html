<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptVault</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 320px;
            min-height: 200px;
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: radial-gradient(ellipse at top, #1a1a2e 0%, #0a0a0f 100%);
            color: #e0e0e0;
            padding: 20px;
        }
        
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .logo {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, #00ffa3, #00cc82);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .title {
            flex: 1;
        }
        
        .title h1 {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }
        
        .title p {
            font-size: 11px;
            color: #666;
            margin-top: 2px;
        }
        
        .btn {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00ffa3, #00cc82);
            color: #0a0a0f;
        }
        
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 255, 163, 0.3);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #e0e0e0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .stats {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .stat-item {
            flex: 1;
            text-align: center;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: 600;
            color: #00ffa3;
        }
        
        .stat-label {
            font-size: 10px;
            color: #666;
            margin-top: 4px;
            text-transform: uppercase;
        }
        
        .empty-state {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 12px;
        }
        
        .shortcut {
            font-size: 11px;
            color: #444;
            text-align: center;
            margin-top: 16px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
        }
        
        .shortcut kbd {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">⚡</div>
        <div class="title">
            <h1>PromptVault</h1>
            <p>本地 AI Prompt 收藏库</p>
        </div>
    </div>
    
    <button id="captureBtn" class="btn btn-primary">
        <span>📋</span> 捕获选中内容
    </button>
    
    <button id="openVaultBtn" class="btn btn-secondary">
        <span>📂</span> 打开收藏库
    </button>
    
    <div class="stats">
        <div class="stat-item">
            <div class="stat-value" id="totalCount">-</div>
            <div class="stat-label">Prompts</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="favCount">-</div>
            <div class="stat-label">收藏</div>
        </div>
    </div>
    
    <div class="shortcut">
        快捷键: <kbd>Ctrl</kbd> + <kbd>Shift</kbd> + <kbd>S</kbd> 快速保存
    </div>
    
    <script src="js/popup.js"></script>
</body>
</html>
